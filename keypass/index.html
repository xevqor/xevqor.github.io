<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XEVQOR KEYPASS - PLATINUM VAULT</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0a0c0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="./icon-192.png">

<style>
    :root { 
        --platinum: #b8c7d9;
        --silver: #9aaebf;
        --ice: #c8d8e8;
        --bg: #0f1215;
        --card: #0a0c0e;
        --border: #1e2428;
        --text-dim: #8a9aa8;
        --alert: #ff6b6b;
        --ok: #6bcf9f;
    }
    body { margin: 0; min-height: 100dvh; background: radial-gradient(circle at 70% 20%, #0f1215, #030405); font-family: 'Montserrat', 'Courier New', monospace; display: flex; align-items: center; justify-content: center; color: #ddd; padding: 15px; box-sizing: border-box; }

    .vault { 
        width: 100%; max-width: 500px; background: var(--card); padding: 25px; 
        border-radius: 1.8rem; border: 1px solid var(--border); 
        box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 30px rgba(255,255,255,0.02); 
        display: flex; flex-direction: column; position: relative;
    }

    .header-ambient { width: 100%; height: 2px; margin-bottom: 20px; background: linear-gradient(90deg, transparent, var(--platinum), var(--ice), var(--platinum), transparent); box-shadow: 0 0 8px rgba(184,199,217,0.4); }
    h2 { margin: 0; font-weight: 400; letter-spacing: 5px; color: var(--ice); font-size: 1.3rem; text-align: center; text-transform: uppercase; text-shadow: 0 0 4px rgba(200,216,232,0.3); }
    #xevqorClock { text-align: center; font-size: 9px; color: #6a7a8a; letter-spacing: 1px; margin-top: 8px; font-weight: bold; text-transform: uppercase; }

    .main-area { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }

    .input-box { display: flex; flex-direction: column; gap: 4px; position: relative; }
    .input-box label { font-size: 8px; color: #6a7a8a; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; padding-left: 5px; }

    input { width: 100%; background: #07090b; border: 1px solid var(--border); color: var(--ice); padding: 11px; padding-right: 40px; border-radius: 2rem; font-size: 13px; outline: none; box-sizing: border-box; transition: 0.2s; font-family: 'Montserrat', monospace; }
    input:focus { border-color: var(--platinum); box-shadow: 0 0 12px rgba(184,199,217,0.2); }

    .eye-btn { position: absolute; right: 16px; bottom: 6px; background: none; border: none; color: #6a7a8a; cursor: pointer; padding: 5px; outline: none; }
    .eye-btn:hover { color: var(--platinum); }

    .dual-results { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 10px; }
    .res-card { 
        background: #07090b; border: 1px solid var(--border); padding: 12px 15px; border-radius: 1.2rem; 
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .res-content { flex: 1; text-align: left; overflow: hidden; }
    .res-label { font-size: 8px; color: #6a7a8a; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; display: block; }
    .res-out { color: var(--platinum); font-size: 0.95rem; letter-spacing: 1px; word-break: break-all; font-weight: bold; min-height: 20px; }

    .mini-copy {
        background: #0a0c0e; border: 1px solid var(--border); color: var(--silver);
        padding: 8px; border-radius: 2rem; cursor: pointer; font-size: 9px;
        transition: 0.2s; display: flex; align-items: center; justify-content: center;
        min-width: 45px; height: 35px; text-transform: uppercase; font-weight: bold;
    }
    .mini-copy:hover { border-color: var(--platinum); color: var(--platinum); background: #111418; }
    .mini-copy:active { transform: scale(0.9); }

    .btn-group { display: flex; gap: 8px; margin-top: 15px; }
    button.action-btn { flex: 1; padding: 14px; background: #0a0c0e; border-radius: 2rem; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s ease; font-size: 10px; outline: none; border: 1px solid rgba(184,199,217,0.4); }

    .btn-gen { border-color: var(--platinum); color: var(--platinum); width: 100%; }
    .btn-wipe { border-color: #7a5a5a; color: var(--alert); }

    button:hover { background: #111418; color: #fff; }
    .btn-gen:hover { box-shadow: 0 0 14px rgba(184,199,217,0.3); background: rgba(184,199,217,0.1); }
    .btn-wipe:hover { box-shadow: 0 0 12px rgba(255,107,107,0.2); background: rgba(255,107,107,0.1); }

    .footer-status { font-size: 8px; color: #5a6a7a; margin-top: 15px; display: flex; justify-content: space-between; border-top: 1px solid #1a1e22; padding-top: 10px; letter-spacing: 2px; text-transform: uppercase; }
    #status { font-weight: bold; color: var(--platinum); }
</style>
</head>
<body>

<div class="vault">
    <div class="header-ambient"></div>
    <h2>XEVQOR KEYPASS</h2>
    <div id="xevqorClock">SYNCING...</div>

    <div class="main-area">
        <div class="input-box">
            <label>Master Brain Key</label>
            <input type="password" id="m1" placeholder="ENTER PRIMARY KEY" autocomplete="off">
            <button class="eye-btn" onclick="toggle('m1', 'e1')">
                <svg id="e1" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </div>

        <div class="input-box">
            <label>Confirm Brain Key</label>
            <input type="password" id="m2" placeholder="VERIFY PRIMARY KEY" autocomplete="off">
            <button class="eye-btn" onclick="toggle('m2', 'e2')">
                <svg id="e2" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </div>

        <div class="input-box">
            <label>Identity Label</label>
            <input type="text" id="label" placeholder="ENTER LABEL NAME" autocomplete="off">
        </div>

        <div class="dual-results">
            <div class="res-card">
                <div class="res-content">
                    <span class="res-label">A: Clean Alpha</span>
                    <div id="outA" class="res-out">LOCKED</div>
                </div>
                <button class="mini-copy" onclick="copy('outA', this)">COPY</button>
            </div>
            <div class="res-card">
                <div class="res-content">
                    <span class="res-label">B: Shielded Master</span>
                    <div id="outB" class="res-out">LOCKED</div>
                </div>
                <button class="mini-copy" onclick="copy('outB', this)">COPY</button>
            </div>
        </div>

        <button class="action-btn btn-gen" onclick="generate()">GENERATE DUAL KEY</button>
        <button class="action-btn btn-wipe" onclick="clearAll()">WIPE MEMORY</button>
    </div>

    <div class="footer-status">
        <span>DUAL-PATH V16 PRO</span>
        <span id="status">STANDBY</span>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        let h = now.getHours(), m = String(now.getMinutes()).padStart(2, '0');
        const ampm = h >= 12 ? 'pm' : 'am';
        h = h % 12 || 12;
        const timeStr = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} | ${h}.${m} ${ampm}`;
        document.getElementById('xevqorClock').innerText = timeStr.toUpperCase();
    }
    setInterval(updateClock, 1000); updateClock();

    function updateStatus(msg, color) {
        const s = document.getElementById("status");
        s.innerText = msg;
        s.style.color = color || "#b8c7d9";
    }

    function toggle(id, eyeId) {
        const p = document.getElementById(id), icon = document.getElementById(eyeId);
        if (p.type === "password") {
            p.type = "text";
            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        } else {
            p.type = "password";
            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }
    }

    async function generate() {
        const k1 = document.getElementById('m1').value, k2 = document.getElementById('m2').value, lbl = document.getElementById('label').value;
        if(!k1 || !k2 || !lbl) { updateStatus("FIELDS REQUIRED", "#ff6b6b"); return; }
        if(k1 !== k2) { updateStatus("MISMATCH DETECTED", "#ff6b6b"); return; }
        updateStatus("MUTATING...", "#b8c7d9");

        try {
            const encoder = new TextEncoder();
            const salt = encoder.encode("XEVQOR_V16_FINAL_2026");
            const buf = encoder.encode(k1 + lbl.toLowerCase());
            const bKey = await crypto.subtle.importKey("raw", buf, "PBKDF2", false, ["deriveBits"]);
            const bits = await crypto.subtle.deriveBits({name: "PBKDF2", salt: salt, iterations: 300000, hash: "SHA-256"}, bKey, 256);
            const raw = btoa(String.fromCharCode(...new Uint8Array(bits))).replace(/\+/g, "X").replace(/\//g, "Z").substring(0, 32);

            document.getElementById('outA').innerText = raw;
            document.getElementById('outB').innerText = raw.substring(0, 29) + "@!7";
            updateStatus("DUAL KEY REVEALED", "#6bcf9f");
        } catch (e) { updateStatus("FATAL ERROR", "#ff6b6b"); }
    }

    function copy(id, btn) {
        const text = document.getElementById(id).innerText;
        if(text === "LOCKED") return;
        const d = document.createElement("textarea"); document.body.appendChild(d); d.value = text; d.select();
        document.execCommand("copy"); document.body.removeChild(d);

        const oldText = btn.innerText;
        btn.innerText = "DONE!"; btn.style.color = "#6bcf9f";
        updateStatus("COPIED!", "#fff"); 
        setTimeout(() => { btn.innerText = oldText; btn.style.color = "#9aaebf"; updateStatus("READY", "#b8c7d9"); }, 1500);
    }

    function clearAll() {
        document.getElementById('m1').value = ""; document.getElementById('m2').value = ""; document.getElementById('label').value = "";
        document.getElementById('outA').innerText = "LOCKED"; document.getElementById('outB').innerText = "LOCKED";
        updateStatus("WIPED", "#ff6b6b"); setTimeout(() => updateStatus("READY", "#b8c7d9"), 1500);
    }
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('XEVQOR KeyPass Engine Online'))
        .catch(err => console.error('Uplink Failed:', err));
    });
  }
</script>

</body>
</html>
