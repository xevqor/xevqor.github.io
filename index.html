<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>XEVQOR CORE | PLATINUM SUITE</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0c0e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 70% 20%, #0f1215, #030405);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    :root {
      --platinum: #b8c7d9;
      --silver: #9aaebf;
      --card-bg: #0a0c0e;
      --border: #1e2428;
      --text-dim: #8a9aa8;
    }

    .core {
      max-width: 520px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 1.8rem;
      border: 1px solid var(--border);
      padding: 1.8rem;
      position: relative;
      box-shadow: 0 40px 120px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,255,255,0.02);
    }

    /* platinum line atas */
    .core::before {
      content: "";
      display: block;
      width: 100%;
      height: 2px;
      margin: 0 auto 1.2rem auto;
      border-radius: 2px;
      background: linear-gradient(90deg,
        rgba(184,199,217,0),
        rgba(184,199,217,0.3),
        rgba(184,199,217,0.8),
        rgba(220,235,250,1),
        rgba(184,199,217,0.8),
        rgba(184,199,217,0.3),
        rgba(184,199,217,0)
      );
      box-shadow: 0 0 8px rgba(184,199,217,0.4);
    }

    /* bottom glow platinum */
    .core::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40px;
      background: linear-gradient(180deg, rgba(184,199,217,0), rgba(184,199,217,0.06), rgba(184,199,217,0.12));
      border-radius: 0 0 1.8rem 1.8rem;
      pointer-events: none;
    }

    .header {
      text-align: center;
      margin-bottom: 1.2rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid #181e22;
    }

    h1 {
      font-size: 1.7rem;
      letter-spacing: 6px;
      font-weight: 400;
      background: linear-gradient(135deg, var(--platinum), #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 10px rgba(184,199,217,0.2);
    }

    .subline {
      font-size: 0.6rem;
      color: #5c6c7a;
      margin-top: 0.2rem;
      letter-spacing: 1px;
    }

    .status {
      margin-top: 0.5rem;
      font-size: 0.6rem;
      color: #6a7a88;
    }

    .status span {
      color: #8fcbff;
    }

    /* grid 2 kolom */
    .apps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 1.8rem 0;
    }

    .app-card {
      background: #050708;
      border: 1px solid var(--border);
      border-radius: 1.2rem;
      padding: 1rem 0.5rem;
      text-align: center;
      transition: 0.25s;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .app-card:hover {
      border-color: var(--platinum);
      background: #0c1014;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 15px rgba(184,199,217,0.1);
    }

    .app-name {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--platinum), #e0e8f0);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-desc {
      font-size: 0.55rem;
      color: var(--text-dim);
    }

    .launch {
      font-size: 0.7rem;
      color: var(--platinum);
      opacity: 0.7;
    }

    .footer {
      margin-top: 1rem;
      font-size: 0.55rem;
      text-align: center;
      color: #4a5a68;
      border-top: 1px solid #181e22;
      padding-top: 0.8rem;
    }

    @media (max-width: 480px) {
      .core { padding: 1.2rem; }
      h1 { font-size: 1.4rem; letter-spacing: 4px; }
      .app-name { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<div class="core">
  <div class="header">
    <h1>XEVQOR CORE</h1>
    <div class="subline">Platinum Control Interface</div>
    <div class="status">
      SYSTEM <span>ACTIVE</span> | UTC <span id="utc"></span>
    </div>
  </div>

  <div class="apps-grid">
    <div class="app-card" onclick="go('/encrypt/')">
      <div class="app-name">ENCRYPT</div>
      <div class="app-desc">AES-256 file vault</div>
      <div class="launch">▶ LAUNCH</div>
    </div>
    <div class="app-card" onclick="go('/nano/')">
      <div class="app-name">NANO</div>
      <div class="app-desc">Squeeze & encrypt text</div>
      <div class="launch">▶ LAUNCH</div>
    </div>
    <div class="app-card" onclick="go('/stego/')">
      <div class="app-name">STEGO</div>
      <div class="app-desc">Steganography phantom</div>
      <div class="launch">▶ LAUNCH</div>
    </div>
    <div class="app-card" onclick="go('/keypass/')">
      <div class="app-name">KEYPASS</div>
      <div class="app-desc">Dual key generator</div>
      <div class="launch">▶ LAUNCH</div>
    </div>
  </div>

  <div class="footer">
    CORE ACTIVE | UTC <span id="clock"></span>
  </div>
</div>

<script>
  const BASE_URL = 'https://xevqor.github.io';
  
  function go(path) {
    window.open(BASE_URL + path, '_blank');
  }

  function formatUTC() {
    const now = new Date();
    const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    
    const dayName = days[now.getUTCDay()];
    const day = now.getUTCDate();
    const month = months[now.getUTCMonth()];
    const year = now.getUTCFullYear();
    
    let hours = now.getUTCHours();
    const minutes = String(now.getUTCMinutes()).padStart(2, '0');
    const seconds = String(now.getUTCSeconds()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12;
    
    const formatted = `${dayName}, ${day} ${month} ${year} ${hours}:${minutes}:${seconds} ${ampm} UTC`;
    document.getElementById('utc').innerText = formatted;
    document.getElementById('clock').innerText = formatted;
  }
  formatUTC();
  setInterval(formatUTC, 1000);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SW registered:', reg))
        .catch(err => console.log('SW error:', err));
    });
  }
</script>
</body>
</html>
